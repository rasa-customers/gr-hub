# Inspector uses an internal API, and not rest, socketio, rasa etc...

# Voice in Rasa Inspector (`rasa inspect --voice`):
# Requires ASR + TTS API keys in your environment, e.g.:
#   export DEEPGRAM_API_KEY=...
#   export CARTESIA_API_KEY=...
browser_audio:
  server_url: localhost
  asr:
    name: deepgram
  tts:
    name: cartesia

# Use REST when building a custom frontend that sends HTTP POST requests to Rasa.
#rest:

# Use SocketIO for real-time web chat widgets, including the official Rasa Chat Widget.
# * e.g. <rasa-chatbot-widget server-url="http://localhost:5005" ...>
socketio:
  bot_message_evt: bot_uttered
  session_persistence: true
  user_message_evt: user_uttered

# Use Rasa when connecting one Rasa assistant to another Rasa server (Rasa-to-Rasa).
#rasa:
#  url: "http://localhost:5002/api"
